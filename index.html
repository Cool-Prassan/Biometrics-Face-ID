<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Face Embedding Capture (face-api.js)</title>
  <link rel="stylesheet" href="style.css">
  <!-- face-api.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <div class="card">
    <h1>Face Embedding Capture</h1>
    <p class="muted">Allow camera → press <b>Capture Enrollment</b> then <b>Capture Verify</b>.</p>

    <div class="video-wrap">
      <video id="video" autoplay muted playsinline></video>
      <div id="loading" class="overlay">Loading models…</div>
    </div>

    <div class="controls">
      <button id="captureEnroll">📸 Capture Enrollment</button>
      <button id="captureVerify" disabled>🔍 Capture Verify</button>
      <label class="threshold">
        Threshold (distance): <input id="thresh" type="number" value="0.6" step="0.05" min="0.1" max="1.5">
      </label>
    </div>

    <div class="panels">
      <section>
        <h3>Enrollment Descriptor (128-D)</h3>
        <div id="enrollContainer" class="descriptor"></div>
      </section>

      <section>
        <h3>Verification Descriptor (128-D)</h3>
        <div id="verifyContainer" class="descriptor"></div>
      </section>
    </div>

    <div id="result" class="result"></div>

    <p class="note">Models are loaded from a public host — first load can take a few seconds.</p>
  </div>
</body>
</html>
